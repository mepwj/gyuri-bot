name: Deploy to Mac mini via Tailscale

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Tailscale 연결
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: 배포 실행
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"

            if [ ! -d "$HOME/gyuri-bot" ]; then
              git clone https://github.com/${{ github.repository }}.git "$HOME/gyuri-bot"
            fi
            cd "$HOME/gyuri-bot"
            git pull origin main

            umask 077
            cat > .env <<EOF
            DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
            CLIENT_ID=${{ secrets.CLIENT_ID }}
            GUILD_ID=${{ secrets.GUILD_ID }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            EOF

            docker compose build
            docker compose run --rm --no-deps gyuri-bot npm run deploy
            docker compose up -d --remove-orphans
            docker compose logs --tail=50 2>&1
